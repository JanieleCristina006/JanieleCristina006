name: Atualizar arte do perfil

on:
  schedule:
    - cron: "17 6 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  heatmap:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: pip install -r scripts/requirements.txt

      - name: Buscar contribuições
        env:
          GH_PROFILE_USER: JanieleCristina006
        run: python scripts/fetch_contributions.py

      - name: Renderizar SVG
        run: python scripts/render_heatmap_svg.py

      - name: Confirmar alterações
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "manutenção: atualizar gráfico de contribuições [skip ci]"
          file_pattern: "data/contributions.json contrib-heatmap.svg"
